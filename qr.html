<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>北京雨燕 - 扫码体验</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #333;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        #qrcode {
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
        }
        .url {
            margin-top: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>北京雨燕</h1>
        <p>扫描二维码体验行程页面</p>
        <div id="qrcode"></div>
        <div class="url">https://moodou666-source.github.io/beijiyuyan-prototype/plan-result-demo.html</div>
    </div>
    
    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "https://moodou666-source.github.io/beijiyuyan-prototype/plan-result-demo.html",
            width: 256,
            height: 256,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
