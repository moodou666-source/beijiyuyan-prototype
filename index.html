<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>圆洲旅迹 - 旅游打卡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            overflow: hidden;
        }
        
        .app-container {
            max-width: 414px;
            margin: 0 auto;
            background: #000;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        
        /* 启动页 */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        
        .splash-logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .splash-title {
            color: white;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
        }
        
        .splash-subtitle {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
            letter-spacing: 2px;
        }
        
        /* 主页 */
        .main-screen {
            height: 100vh;
            position: relative;
            overflow-y: auto;
            scrollbar-width: none;
        }
        
        .main-screen::-webkit-scrollbar {
            display: none;
        }
        
        /* 顶部状态栏 */
        .status-bar {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 414px;
            height: 44px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 100;
            color: white;
            font-size: 14px;
        }
        
        .status-time {
            font-weight: 600;
        }
        
        .status-icons {
            display: flex;
            gap: 5px;
        }
        
        /* 顶部导航 */
        .top-nav {
            position: fixed;
            top: 44px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 414px;
            height: 50px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 100;
        }
        
        .nav-title {
            color: white;
            font-size: 18px;
            font-weight: 700;
        }
        
        .nav-icons {
            display: flex;
            gap: 15px;
        }
        
        .nav-icon {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }
        
        /* 内容区域 */
        .content-area {
            padding-top: 94px;
            padding-bottom: 80px;
        }
        
        /* 故事/快拍栏 */
        .stories-bar {
            display: flex;
            gap: 10px;
            padding: 15px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        .stories-bar::-webkit-scrollbar {
            display: none;
        }
        
        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            min-width: 70px;
        }
        
        .story-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #ff6b6b;
            padding: 2px;
        }
        
        .story-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .story-name {
            color: white;
            font-size: 11px;
            text-align: center;
        }
        
        /* 打卡卡片 - 全屏风格 */
        .feed-card {
            position: relative;
            width: 100%;
            height: 70vh;
            margin-bottom: 2px;
        }
        
        .feed-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .feed-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            padding: 20px;
            color: white;
        }
        
        .feed-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .feed-user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid white;
        }
        
        .feed-user-info {
            flex: 1;
        }
        
        .feed-username {
            font-size: 14px;
            font-weight: 600;
        }
        
        .feed-time {
            font-size: 12px;
            color: #ccc;
        }
        
        .feed-location {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #ccc;
            margin-bottom: 10px;
        }
        
        .feed-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .feed-desc {
            font-size: 14px;
            color: #ddd;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        
        .feed-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .feed-tag {
            padding: 4px 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            font-size: 12px;
        }
        
        /* 右侧操作按钮 */
        .feed-actions {
            position: absolute;
            right: 15px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: white;
        }
        
        .action-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            backdrop-filter: blur(5px);
        }
        
        .action-count {
            font-size: 12px;
            font-weight: 600;
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 414px;
            height: 70px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
            z-index: 100;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #666;
            cursor: pointer;
            padding: 5px 15px;
        }
        
        .nav-item.active {
            color: white;
        }
        
        .nav-item-icon {
            font-size: 24px;
        }
        
        .nav-item-label {
            font-size: 10px;
        }
        
        .add-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            margin-top: -20px;
            border: 3px solid #000;
        }
        
        /* 页面切换 */
        .page {
            display: none;
            height: 100vh;
            overflow-y: auto;
        }
        
        .page.active {
            display: block;
        }
        
        /* 发现页面 */
        .discover-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
            padding: 2px;
        }
        
        .discover-item {
            position: relative;
            aspect-ratio: 3/4;
        }
        
        .discover-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .discover-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
            color: white;
        }
        
        .discover-title {
            font-size: 14px;
            font-weight: 600;
        }
        
        .discover-location {
            font-size: 12px;
            color: #ccc;
        }
        
        /* 消息页面 */
        .message-list {
            padding: 15px;
        }
        
        .message-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .message-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
        }
        
        .message-content {
            flex: 1;
        }
        
        .message-name {
            color: white;
            font-size: 15px;
            font-weight: 600;
        }
        
        .message-text {
            color: #999;
            font-size: 13px;
            margin-top: 4px;
        }
        
        .message-time {
            color: #666;
            font-size: 12px;
        }
        
        /* 个人页面 */
        .profile-header {
            padding: 100px 20px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%);
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid white;
            margin-bottom: 10px;
        }
        
        .profile-name {
            color: white;
            font-size: 20px;
            font-weight: 700;
        }
        
        .profile-bio {
            color: #999;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        
        .profile-stat {
            text-align: center;
            color: white;
        }
        
        .profile-stat-value {
            font-size: 20px;
            font-weight: 700;
        }
        
        .profile-stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 2px;
        }
        
        .profile-grid-item {
            aspect-ratio: 1;
        }
        
        .profile-grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 启动页 -->
        <div class="splash-screen" id="splash">
            <div class="splash-logo">🌍</div>
            <div class="splash-title">圆洲旅迹</div>
            <div class="splash-subtitle">探索世界的美好</div>
        </div>
        
        <!-- 主页 -->
        <div class="main-screen" id="main-screen">
            <!-- 顶部状态栏 -->
            <div class="status-bar">
                <div class="status-time">9:41</div>
                <div class="status-icons">
                    <span>📶</span>
                    <span>📡</span>
                    <span>🔋</span>
                </div>
            </div>
            
            <!-- 顶部导航 -->
            <div class="top-nav">
                <div class="nav-title">发现</div>
                <div class="nav-icons">
                    <div class="nav-icon">🔍</div>
                    <div class="nav-icon">🔔</div>
                </div>
            </div>
            
            <!-- 内容区域 -->
            <div class="content-area">
                <!-- 故事栏 -->
                <div class="stories-bar">
                    <div class="story-item">
                        <div class="story-avatar">
                            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100" alt="用户">
                        </div>
                        <div class="story-name">我的故事</div>
                    </div>
                    <div class="story-item">
                        <div class="story-avatar">
                            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100" alt="用户">
                        </div>
                        <div class="story-name">小明</div>
                    </div>
                    <div class="story-item">
                        <div class="story-avatar">
                            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100" alt="用户">
                        </div>
                        <div class="story-name">旅行者</div>
                    </div>
                    <div class="story-item">
                        <div class="story-avatar">
                            <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100" alt="用户">
                        </div>
                        <div class="story-name">摄影师</div>
                    </div>
                </div>
                
                <!-- 打卡内容 -->
                <div class="feed-card">
                    <img src="https://images.unsplash.com/photo-1508804185872-d7badad00f7d?w=800" alt="打卡" class="feed-image">
                    <div class="feed-overlay">
                        <div class="feed-header">
                            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100" alt="用户" class="feed-user-avatar">
                            <div class="feed-user-info">
                                <div class="feed-username">旅行达人</div>
                                <div class="feed-time">2小时前</div>
                            </div>
                        </div>
                        <div class="feed-location">
                            <span>📍</span>
                            <span>南京·中山陵</span>
                        </div>
                        <div class="feed-title">中山陵的日出太美了！</div>
                        <div class="feed-desc">清晨5点起床，终于拍到了中山陵的绝美日出。金色的阳光洒在台阶上，整个建筑都笼罩在温暖的光芒中...</div>
                        <div class="feed-tags">
                            <span class="feed-tag">#日出</span>
                            <span class="feed-tag">#中山陵</span>
                            <span class="feed-tag">#摄影</span>
                        </div>
                    </div>
                    <div class="feed-actions">
                        <div class="action-btn">
                            <div class="action-icon">❤️</div>
                            <div class="action-count">2.3k</div>
                        </div>
                        <div class="action-btn">
                            <div class="action-icon">💬</div>
                            <div class="action-count">186</div>
                        </div>
                        <div class="action-btn">
                            <div class="action-icon">📤</div>
                            <div class="action-count">分享</div>
                        </div>
                    </div>
                </div>
                
                <div class="feed-card">
                    <img src="https://images.unsplash.com/photo-1529921879218-f99546d189a7?w=800" alt="打卡" class="feed-image">
                    <div class="feed-overlay">
                        <div class="feed-header">
                            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100" alt="用户" class="feed-user-avatar">
                            <div class="feed-user-info">
                                <div class="feed-username">摄影师小王</div>
                                <div class="feed-time">5小时前</div>
                            </div>
                        </div>
                        <div class="feed-location">
                            <span>📍</span>
                            <span>苏州·拙政园</span>
                        </div>
                        <div class="feed-title">拙政园的春天</div>
                        <div class="feed-desc">春天的拙政园美得像一幅画，亭台楼阁，小桥流水，每一处都是绝佳的拍摄点...</div>
                        <div class="feed-tags">
                            <span class="feed-tag">#园林</span>
                            <span class="feed-tag">#春天</span>
                            <span class="feed-tag">#苏州</span>
                        </div>
                    </div>
                    <div class="feed-actions">
                        <div class="action-btn">
                            <div class="action-icon">❤️</div>
                            <div class="action-count">1.8k</div>
                        </div>
                        <div class="action-btn">
                            <div class="action-icon">💬</div>
                            <div class="action-count">142</div>
                        </div>
                        <div class="action-btn">
                            <div class="action-icon">📤</div>
                            <div class="action-count">分享</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 底部导航 -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('home')">
                <div class="nav-item-icon">🏠</div>
                <div class="nav-item-label">首页</div>
            </div>
            <div class="nav-item" onclick="switchTab('discover')">
                <div class="nav-item-icon">🔍</div>
                <div class="nav-item-label">发现</div>
            </div>
            <div class="add-btn" onclick="addPost()">+</div>
            <div class="nav-item" onclick="switchTab('message')">
                <div class="nav-item-icon">💬</div>
                <div class="nav-item-label">消息</div>
            </div>
            <div class="nav-item" onclick="switchTab('profile')">
                <div class="nav-item-icon">👤</div>
                <div class="nav-item-label">我的</div>
            </div>
        </div>
    </div>

    <script>
        // 启动页动画
        setTimeout(() => {
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
            }, 500);
        }, 2000);
        
        // 切换标签
        function switchTab(tab) {
            // 更新导航状态
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.closest('.nav-item').classList.add('active');
            
            // 这里可以添加页面切换逻辑
            console.log('切换到:', tab);
        }
        
        // 添加帖子
        function addPost() {
            alert('发布功能\n\n将包含：\n- 拍照/选择照片\n- 添加位置\n- 添加描述\n- 添加标签');
        }
    </script>
</body>
</html>
