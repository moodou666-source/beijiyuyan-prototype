<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>圆周旅迹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            overflow-x: hidden;
        }
        
        .app-container {
            max-width: 414px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
        }
        
        /* 状态栏 */
        .status-bar {
            height: 44px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            font-size: 15px;
            font-weight: 600;
        }
        
        .status-time {
            font-weight: 700;
        }
        
        .status-icons {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        
        /* 顶部导航 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            background: white;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }
        
        .header-icons {
            display: flex;
            gap: 15px;
        }
        
        .header-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #666;
        }
        
        /* 内容区域 */
        .content {
            padding: 15px;
        }
        
        /* 精选专题 */
        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .section-title-text {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }
        
        .section-title-arrow {
            color: #999;
            font-size: 18px;
        }
        
        /* 横向滚动 */
        .horizontal-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 10px;
        }
        
        .horizontal-scroll::-webkit-scrollbar {
            display: none;
        }
        
        .topic-card {
            min-width: 280px;
            height: 180px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            background: #f0f0f0;
        }
        
        .topic-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .topic-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
            color: white;
        }
        
        .topic-tag {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 8px;
            backdrop-filter: blur(5px);
        }
        
        .topic-title {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
        }
        
        /* 我的行程 */
        .trip-section {
            margin-top: 25px;
        }
        
        .trip-card {
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }
        
        .trip-card.yellow {
            background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
        }
        
        .trip-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }
        
        .trip-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
            color: #666;
            font-size: 14px;
        }
        
        .trip-users {
            display: flex;
            align-items: center;
            margin-top: 15px;
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid white;
            margin-right: -8px;
        }
        
        .add-user-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: white;
            border: 2px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 18px;
            margin-left: 5px;
        }
        
        .trip-image {
            position: absolute;
            right: -20px;
            bottom: -20px;
            width: 150px;
            height: 150px;
            border-radius: 20px;
            overflow: hidden;
            transform: rotate(-10deg);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .trip-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .delete-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 20px;
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 414px;
            height: 70px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
            z-index: 100;
            border-top: 1px solid #f0f0f0;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #999;
            cursor: pointer;
            padding: 5px 20px;
        }
        
        .nav-item.active {
            color: #333;
        }
        
        .nav-item-icon {
            font-size: 24px;
        }
        
        .nav-item-label {
            font-size: 11px;
        }
        
        .add-btn {
            width: 50px;
            height: 50px;
            background: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            margin-top: -20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        /* 页面切换 */
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-time">18:22</div>
            <div class="status-icons">
                <span>📶</span>
                <span>📡</span>
                <span>🔋</span>
            </div>
        </div>
        
        <!-- 顶部导航 -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🧳</div>
                <div class="logo-text">圆周旅迹</div>
            </div>
            <div class="header-icons">
                <div class="header-icon">🔍</div>
                <div class="header-icon">👤</div>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <!-- 精选专题 -->
            <div class="section-title">
                <div class="section-title-text">精选专题</div>
                <div class="section-title-arrow">›</div>
            </div>
            
            <div class="horizontal-scroll">
                <div class="topic-card">
                    <img src="https://images.unsplash.com/photo-1508804185872-d7badad00f7d?w=600" alt="旅行报告">
                    <div class="topic-overlay">
                        <div class="topic-tag">🎁 五一旅行</div>
                        <div class="topic-title">五一旅行鉴定报告</div>
                    </div>
                </div>
                
                <div class="topic-card">
                    <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=600" alt="风景">
                    <div class="topic-overlay">
                        <div class="topic-tag">👀 有点意思</div>
                        <div class="topic-title">这些风景，真不是AI！</div>
                    </div>
                </div>
                
                <div class="topic-card">
                    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600" alt="美食">
                    <div class="topic-overlay">
                        <div class="topic-tag">😋 吃点好的</div>
                        <div class="topic-title">旅游，就是换个地方吃外卖？</div>
                    </div>
                </div>
            </div>
            
            <!-- 我的行程 -->
            <div class="trip-section">
                <div class="section-title">
                    <div class="section-title-text">我的行程</div>
                </div>
                
                <div class="trip-card">
                    <div class="trip-title">苏湖景五日文艺之旅</div>
                    <div class="trip-info">
                        <div>5天4晚</div>
                        <div>27个地点</div>
                    </div>
                    <div class="trip-users">
                        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100" alt="用户" class="user-avatar">
                        <div class="add-user-btn">+</div>
                    </div>
                    <div class="trip-image">
                        <img src="https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=300" alt="风景">
                    </div>
                </div>
                
                <div class="trip-card yellow">
                    <div class="trip-title">京文艺小众五日行</div>
                    <div class="trip-info">
                        <div>5天4晚</div>
                        <div>18个地点</div>
                    </div>
                    <div class="trip-users">
                        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100" alt="用户" class="user-avatar">
                        <div class="add-user-btn">+</div>
                    </div>
                    <div class="trip-image">
                        <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=300" alt="风景">
                    </div>
                    <div class="delete-btn">🗑️</div>
                </div>
            </div>
        </div>
        
        <!-- 底部导航 -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('trip')">
                <div class="nav-item-icon">🧳</div>
                <div class="nav-item-label">行程</div>
            </div>
            <div class="add-btn" onclick="addTrip()">+</div>
            <div class="nav-item" onclick="switchTab('explore')">
                <div class="nav-item-icon">🧭</div>
                <div class="nav-item-label">探索</div>
            </div>
        </div>
    </div>

    <script>
        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.closest('.nav-item').classList.add('active');
            
            if (tab === 'explore') {
                alert('探索页面\n\n将包含：\n- 热门目的地\n- 推荐行程\n- 旅行攻略');
            }
        }
        
        // 添加行程
        function addTrip() {
            alert('创建新行程\n\n将包含：\n- 选择目的地\n- 设置日期\n- 添加同伴');
        }
        
        // 更新时间
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.querySelector('.status-time').textContent = `${hours}:${minutes}`;
        }
        
        updateTime();
        setInterval(updateTime, 60000);
    </script>
</body>
</html>
