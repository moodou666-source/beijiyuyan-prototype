<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>北京雨燕 - 摄影旅行指南</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #f59e0b;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius-sm: 8px;
            --radius: 16px;
            --radius-lg: 24px;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        .app-container {
            max-width: 430px;
            margin: 0 auto;
            background: var(--bg);
            min-height: 100vh;
            position: relative;
            padding-bottom: 90px;
        }
        
        /* Glass morphism header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(248, 250, 252, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 20px;
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .icon-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* Hero section */
        .hero {
            padding: 24px 20px;
        }
        
        .hero-title {
            font-size: 28px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 8px;
        }
        
        .hero-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
        }
        
        /* Featured topics - Horizontal scroll */
        .topics-section {
            padding: 0 20px 24px;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 700;
        }
        
        .section-link {
            font-size: 14px;
            color: var(--primary);
            font-weight: 500;
        }
        
        .topics-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 8px;
        }
        
        .topics-scroll::-webkit-scrollbar {
            display: none;
        }
        
        .topic-card {
            min-width: 280px;
            height: 160px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .topic-card:hover {
            transform: translateY(-4px);
        }
        
        .topic-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .topic-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 60%);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        
        .topic-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            font-size: 12px;
            color: white;
            width: fit-content;
            margin-bottom: 8px;
        }
        
        .topic-title {
            font-size: 18px;
            font-weight: 700;
            color: white;
            line-height: 1.4;
        }
        
        /* My trips */
        .trips-section {
            padding: 0 20px 24px;
        }
        
        .trip-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .trip-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        
        .trip-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            opacity: 0.1;
            border-radius: 0 0 0 100%;
        }
        
        .trip-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .trip-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .trip-badge {
            padding: 4px 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .trip-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .trip-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .trip-users {
            display: flex;
            align-items: center;
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--surface);
            margin-right: -8px;
            object-fit: cover;
        }
        
        .add-user-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            font-size: 16px;
            cursor: pointer;
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(226, 232, 240, 0.6);
            padding: 12px 24px 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-tertiary);
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px 12px;
        }
        
        .nav-item.active {
            color: var(--primary);
        }
        
        .nav-item-icon {
            font-size: 24px;
            transition: transform 0.2s;
        }
        
        .nav-item:hover .nav-item-icon {
            transform: scale(1.1);
        }
        
        .nav-item-label {
            font-size: 11px;
            font-weight: 500;
        }
        
        .fab {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            transition: all 0.3s;
            margin-top: -28px;
        }
        
        .fab:hover {
            transform: scale(1.05) rotate(90deg);
            box-shadow: 0 12px 32px rgba(99, 102, 241, 0.5);
        }
        
        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-in {
            animation: fadeInUp 0.5s ease-out;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">✦</div>
                    <div class="logo-text">北京雨燕</div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn">🔍</button>
                    <button class="icon-btn">👤</button>
                </div>
            </div>
        </header>
        
        <!-- Hero -->
        <section class="hero animate-in">
            <h1 class="hero-title">发现摄影<br>打卡圣地</h1>
            <p class="hero-subtitle">真实用户数据，拒绝营销内容</p>
        </section>
        
        <!-- Featured Topics -->
        <section class="topics-section animate-in">
            <div class="section-header">
                <h2 class="section-title">精选专题</h2>
                <a href="#" class="section-link">查看全部 →</a>
            </div>
            <div class="topics-scroll">
                <div class="topic-card">
                    <img src="https://images.unsplash.com/photo-1508804185872-d7badad00f7d?w=600" alt="旅行报告">
                    <div class="topic-overlay">
                        <div class="topic-tag">📸 摄影圣地</div>
                        <div class="topic-title">五一摄影打卡指南</div>
                    </div>
                </div>
                <div class="topic-card">
                    <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=600" alt="风景">
                    <div class="topic-overlay">
                        <div class="topic-tag">📷 出片指南</div>
                        <div class="topic-title">这些机位，张张大片！</div>
                    </div>
                </div>
                <div class="topic-card">
                    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600" alt="美食">
                    <div class="topic-overlay">
                        <div class="topic-tag">🌅 黄金时刻</div>
                        <div class="topic-title">捕捉最美光线，拍出大片感</div>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- My Trips -->
        <section class="trips-section animate-in">
            <div class="section-header">
                <h2 class="section-title">我的行程</h2>
            </div>
            
            <div class="trip-card" onclick="showTripDetail()">
                <div class="trip-header">
                    <div class="trip-name">苏州摄影打卡5日行</div>
                    <div class="trip-badge">摄影路线</div>
                </div>
                <div class="trip-meta">
                    <div class="trip-meta-item">
                        <span>📸</span>
                        <span>15个机位</span>
                    </div>
                    <div class="trip-meta-item">
                        <span>🌅</span>
                        <span>8个黄金时刻</span>
                    </div>
                </div>
                <div class="trip-users">
                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100" alt="用户" class="user-avatar">
                    <div class="add-user-btn">+</div>
                </div>
            </div>
            
            <div class="trip-card" onclick="showTripDetail()">
                <div class="trip-header">
                    <div class="trip-name">北京古建筑摄影指南</div>
                </div>
                <div class="trip-meta">
                    <div class="trip-meta-item">
                        <span>📸</span>
                        <span>12个机位</span>
                    </div>
                    <div class="trip-meta-item">
                        <span>🏛️</span>
                        <span>6座古建筑</span>
                    </div>
                </div>
                <div class="trip-users">
                    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100" alt="用户" class="user-avatar">
                    <div class="add-user-btn">+</div>
                </div>
            </div>
        </section>
        
        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item active">
                <div class="nav-item-icon">🏠</div>
                <div class="nav-item-label">首页</div>
            </div>
            <div class="fab" onclick="showCreateModal()">+</div>
            <div class="nav-item" onclick="showExplore()">
                <div class="nav-item-icon">🧭</div>
                <div class="nav-item-label">探索</div>
            </div>
        </nav>
    </div>

    <script>
        function showTripDetail() {
            alert('行程详情页面\n\n包含：\n- 地图路线\n- 每日行程\n- 景点详情');
        }
        
        function showCreateModal() {
            alert('创建行程\n\n包含：\n- 选择目的地\n- 设置日期\n- 选择偏好');
        }
        
        function showExplore() {
            alert('探索页面\n\n包含：\n- 地图探索\n- 景点推荐\n- 城市选择');
        }
    </script>
</body>
</html>
